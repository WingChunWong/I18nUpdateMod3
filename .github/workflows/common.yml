# .github/workflows/common.yml
name: Common
on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string
      is-snapshot:
        required: false
        type: boolean
        default: true
      change-log:
        required: false
        type: string

jobs:
  build-common:
    name: Build Common
    runs-on: ubuntu-latest
    environment: Build
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '21'
          cache: 'gradle'
      -
        name: Build
        env:
          IS_SNAPSHOT: ${{ inputs.is-snapshot }}
        run: |
          ./gradlew clean shadowJar --info --stacktrace
      -
        # 新增：上传到GitHub Release（仅在release事件时执行）
        name: Upload to Release
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./build/libs/I18nUpdateMod-${{ env.VERSION }}.jar
          asset_name: I18nUpdateMod-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive
      -
        uses: actions/upload-artifact@v4
        with:
          name: I18nUpdateMod-${{ inputs.type }}-${{ github.run_number }}
          path: build/libs
